<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Kehadiran</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/base.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/data_kehadiran.css') }}"
    />
  </head>
  <body>
    <nav>
      <span class="brand">[ PRESENSI MULTI WAJAH ]</span>
      <a href="/kehadiran" class="active">Data Kehadiran</a>
    </nav>

    <main>
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-wrap">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input
            type="text"
            id="search"
            placeholder="Cari nomor identitas atau nama..."
            oninput="onSearch()"
          />
        </div>
        <div class="date-filter">
          <label>Dari:</label>
          <input type="date" id="filter-date-dari" onchange="onDateChange()" />
          <label>Sampai:</label>
          <input
            type="date"
            id="filter-date-sampai"
            onchange="onDateChange()"
          />
        </div>
        <button id="btn-export" class="btn btn-export" onclick="exportExcel()">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Export Excel
        </button>
        <span class="badge" id="total-badge">0 data</span>
      </div>

      <!-- Tabel -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nomor Identitas</th>
              <th>Nama Pengguna</th>
              <th>Waktu Presensi</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </main>

    <script src="{{ url_for('static', filename='js/data_kehadiran.js') }}"></script>
  </body>
</html>
